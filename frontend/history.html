<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Prediksi - Hotel Electricity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/auth-guard.js"></script>
    <script src="js/api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --purple-dark:#6956F6; --purple-mid:#8C4AF2; --purple-light:#AA9ADB; --purple-bg:#ECECFC; --purple-muted:#374151; }
        body { font-family:'Poppins',sans-serif; background:var(--purple-bg); }
        .sidebar { width:240px; min-height:100vh; background:var(--purple-dark); display:flex; flex-direction:column; position:fixed; left:0; top:0; bottom:0; z-index:40; box-shadow:4px 0 24px rgba(105,86,246,0.25); }
        .sidebar-logo { padding:24px 20px; border-bottom:1px solid rgba(255,255,255,0.15); }
        .sidebar-nav { padding:16px 12px; flex:1; }
        .nav-item { display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:10px; color:rgba(255,255,255,0.55); font-size:14px; font-weight:500; cursor:pointer; transition:all 0.2s; margin-bottom:4px; text-decoration:none; }
        .nav-item:hover { background:rgba(255,255,255,0.15); color:#fff; }
        .nav-item.active { background:#fff; color:var(--purple-dark); font-weight:600; box-shadow:0 2px 12px rgba(0,0,0,0.12); }
        .nav-item svg { width:18px; height:18px; flex-shrink:0; }
        .nav-section-label { font-size:10px; font-weight:600; color:rgba(255,255,255,0.40); text-transform:uppercase; letter-spacing:.08em; padding:8px 14px 4px; margin-top:8px; }
        .sidebar-footer { padding:16px 12px; border-top:1px solid rgba(255,255,255,0.15); }
        .logout-btn { display:flex; align-items:center; gap:8px; width:100%; padding:8px 12px; border-radius:8px; color:rgba(255,255,255,0.55); font-size:14px; transition:all .2s; background:transparent; border:none; cursor:pointer; }
        .logout-btn:hover { color:#fca5a5; background:rgba(239,68,68,0.15); }
        .main-wrapper { margin-left:240px; min-height:100vh; display:flex; flex-direction:column; }
        .topbar { background:rgba(255,255,255,0.80); backdrop-filter:blur(12px); border-bottom:1px solid rgba(105,86,246,0.12); position:sticky; top:0; z-index:30; padding:0 32px; height:64px; display:flex; align-items:center; justify-content:space-between; }
        .card { background:#fff; border:1px solid rgba(105,86,246,0.12); box-shadow:0 2px 12px rgba(105,86,246,0.08); border-radius:16px; }
        .history-row { border-bottom:1px solid rgba(105,86,246,0.08); transition:background 0.2s; }
        .history-row:last-child { border-bottom:none; }
        .history-row:hover { background:var(--purple-bg); }
        .badge-high   { background:rgba(239,68,68,0.10);  color:#dc2626; border:1px solid rgba(239,68,68,0.25); }
        .badge-normal { background:rgba(105,86,246,0.10); color:#6956F6; border:1px solid rgba(105,86,246,0.25); }
        .badge-low    { background:rgba(16,185,129,0.10); color:#059669; border:1px solid rgba(16,185,129,0.25); }
        .modal-overlay { position:fixed; inset:0; background:rgba(105,86,246,0.20); backdrop-filter:blur(6px); z-index:100; display:flex; align-items:center; justify-content:center; }
        .modal-box { background:#fff; border:1px solid rgba(105,86,246,0.15); border-radius:20px; width:90%; max-width:520px; padding:28px; box-shadow:0 20px 60px rgba(105,86,246,0.20); }
        .filter-select { background:var(--purple-bg); border:1px solid rgba(105,86,246,0.25); color:#1e1b4b; font-family:'Poppins',sans-serif; font-size:12px; border-radius:8px; padding:6px 10px; outline:none; cursor:pointer; }
        .filter-select:focus { border-color:var(--purple-dark); }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation:fadeIn 0.3s ease forwards; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-white/20 rounded-xl flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <div>
                <p class="text-white font-bold text-sm leading-tight">Energy Monitor</p>
                <p class="text-white/50 text-xs">Hotel Electricity</p>
            </div>
        </div>
    </div>
    <nav class="sidebar-nav">
        <p class="nav-section-label">Main Menu</p>
        <a href="dashboard.html" class="nav-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Dashboard
        </a>
        <a href="upload.html" class="nav-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
            Upload Data
        </a>
        <p class="nav-section-label">Analisis</p>
        <a href="prediksi.html" class="nav-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            Prediksi & Optimasi
        </a>
        <a href="history.html" class="nav-item active">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Riwayat Prediksi
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="flex items-center gap-3 px-2 mb-3">
            <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center flex-shrink-0">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-white text-sm font-medium truncate" id="userName">Manager</p>
                <p class="text-white/50 text-xs">Hotel Manager</p>
            </div>
        </div>
        <button onclick="logout()" class="logout-btn">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            Logout
        </button>
    </div>
</aside>

<div class="main-wrapper">
    <header class="topbar">
        <div>
            <h2 class="font-bold text-lg leading-tight" style="color:#1e1b4b;">Riwayat Prediksi</h2>
            <p class="text-xs mt-0.5" style="color:#374151;">Semua hasil prediksi CNN-GSO yang pernah dijalankan</p>
        </div>
        <div class="flex items-center gap-3">
            <select id="filterLimit" onchange="loadHistory()" class="filter-select">
                <option value="10">10 terbaru</option>
                <option value="25">25 terbaru</option>
                <option value="50">50 terbaru</option>
            </select>
            <a href="upload.html" class="flex items-center gap-2 text-white text-xs font-semibold px-4 py-2 rounded-lg hover:opacity-90 transition"
                style="background:#6956F6;box-shadow:0 4px 12px rgba(105,86,246,0.35);">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Prediksi Baru
            </a>
        </div>
    </header>

    <main class="flex-1 p-8">
        <div class="grid grid-cols-3 gap-5 mb-6" id="statCards"></div>
        <div class="card p-0 overflow-hidden">
            <div class="px-6 py-4 flex items-center justify-between" style="border-bottom:1px solid rgba(105,86,246,0.10);">
                <h3 class="font-semibold text-sm" style="color:#1e1b4b;">Semua Riwayat Prediksi</h3>
                <span class="text-xs" style="color:#374151;" id="totalCount">—</span>
            </div>
            <div id="historyContainer"></div>
        </div>
    </main>
</div>

<!-- Modal -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal-box fade-in" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between mb-5">
            <h3 class="font-bold text-base" style="color:#1e1b4b;">Detail Prediksi</h3>
            <button onclick="closeModal()" style="color:#374151;">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div id="modalContent"></div>
    </div>
</div>

<script>
if (!requireAuth()) throw new Error('Not authenticated');

// MAPE ke desimal — DB simpan dalam %, konversi ke desimal
function mapeDesimal(mape) {
    if (!mape && mape !== 0) return '—';
    const d = mape > 1 ? mape / 100 : mape; // handle jika DB simpan % atau desimal
    return d.toFixed(4).replace('.', ',');
}

document.addEventListener('DOMContentLoaded', () => {
    const user = getUser();
    if (user) document.getElementById('userName').textContent = user.username;
    loadHistory();
});

async function loadHistory() {
    const limit     = document.getElementById('filterLimit').value;
    const container = document.getElementById('historyContainer');
    container.innerHTML = `
        <div class="flex items-center justify-center py-16" style="color:#374151;">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 mr-3" style="border-color:#6956F6;"></div>
            Memuat riwayat...
        </div>`;

    try {
        const token = getToken();
        const res   = await fetch(`${API_BASE_URL}/predict/history?limit=${limit}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data  = await res.json();

        if (!data.success || !data.history.length) {
            container.innerHTML = `
                <div class="text-center py-16">
                    <div class="w-14 h-14 mx-auto rounded-2xl flex items-center justify-center mb-3" style="background:rgba(105,86,246,0.08);">
                        <svg class="w-7 h-7" style="color:#374151;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <p class="text-sm" style="color:#374151;">Belum ada riwayat prediksi</p>
                    <a href="upload.html" class="inline-block mt-4 text-xs font-medium hover:underline" style="color:#6956F6;">Upload data sekarang →</a>
                </div>`;
            renderStatCards([]);
            return;
        }

        renderStatCards(data.history);
        renderTable(data.history);
        document.getElementById('totalCount').textContent = `${data.history.length} prediksi`;
    } catch (e) {
        container.innerHTML = `<div class="text-center py-12 text-sm text-red-500">Gagal memuat riwayat — pastikan backend berjalan</div>`;
    }
}

function renderStatCards(history) {
    if (!history.length) { document.getElementById('statCards').innerHTML = ''; return; }

    const avgKwh  = (history.reduce((s,h) => s+(h.next_day_kwh||0), 0) / history.length).toFixed(1);
    const lastKwh = history[0].next_day_kwh?.toFixed(1) || '—';
    const lastDate = new Date(history[0].created_at).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});

    document.getElementById('statCards').innerHTML = `
        <div class="card p-5">
            <p class="text-xs uppercase tracking-wide mb-2" style="color:#374151;">Total Prediksi</p>
            <p class="text-2xl font-bold" style="color:#1e1b4b;">${history.length}</p>
            <p class="text-xs mt-1" style="color:#374151;">riwayat tersimpan</p>
        </div>
        <div class="card p-5">
            <p class="text-xs uppercase tracking-wide mb-2" style="color:#374151;">Prediksi Terakhir</p>
            <p class="text-2xl font-bold" style="color:#6956F6;">${lastKwh} <span class="text-sm font-normal" style="color:#374151;">kWh</span></p>
            <p class="text-xs mt-1" style="color:#374151;">${lastDate}</p>
        </div>
        <div class="card p-5">
            <p class="text-xs uppercase tracking-wide mb-2" style="color:#374151;">Rata-rata Prediksi</p>
            <p class="text-2xl font-bold" style="color:#1e1b4b;">${avgKwh} <span class="text-sm font-normal" style="color:#374151;">kWh</span></p>
            <p class="text-xs mt-1" style="color:#374151;">dari semua riwayat</p>
        </div>`;
}

function renderTable(history) {
    document.getElementById('historyContainer').innerHTML = history.map((h, i) => {
        const dt     = new Date(h.created_at);
        const tgl    = dt.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
        const jam    = dt.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
        const kwh    = h.next_day_kwh ? Math.round(h.next_day_kwh).toLocaleString('id-ID') : '—';
        const cost   = h.next_day_cost ? `Rp ${(h.next_day_cost/1e6).toFixed(2)}jt` : '—';
        const mapeD  = mapeDesimal(h.mape);
        const status = h.next_day_kwh > 2500 ? 'high' : h.next_day_kwh < 2200 ? 'low' : 'normal';
        const badgeLabel = status==='high' ? '⚠️ Tinggi' : status==='low' ? '✅ Hemat' : '🔵 Normal';

        return `
        <div class="history-row px-6 py-4 flex items-center gap-4 cursor-pointer"
             onclick='showDetail(${JSON.stringify(h)})'>
            <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-xs font-bold"
                style="background:var(--purple-bg);color:#6956F6;">${i+1}</div>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate" style="color:#1e1b4b;">${h.dataset_filename||'Dataset'}</p>
                <p class="text-xs" style="color:#374151;">${h.total_rows} baris data</p>
            </div>
            <div class="text-right hidden sm:block w-32">
                <p class="text-xs font-medium" style="color:#374151;">${tgl}</p>
                <p class="text-xs" style="color:#374151;">${jam}</p>
            </div>
            <div class="text-right w-32">
                <p class="text-sm font-bold" style="color:#6956F6;">${kwh} kWh</p>
                <p class="text-xs" style="color:#374151;">${cost}</p>
            </div>
            <div class="text-right w-24">
                <p class="text-sm font-semibold" style="color:#1e1b4b;">${mapeD}</p>
                <p class="text-xs" style="color:#374151;">MAPE</p>
            </div>
            <div class="w-24 text-right">
                <span class="badge-${status} px-2 py-1 rounded-full text-xs font-medium">${badgeLabel}</span>
            </div>
            <svg class="w-4 h-4 flex-shrink-0" style="color:#374151;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
        </div>`;
    }).join('');
}

function showDetail(h) {
    const dt  = new Date(h.created_at);
    const tgl = dt.toLocaleDateString('id-ID',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    const jam = dt.toLocaleTimeString('id-ID');

    document.getElementById('modalContent').innerHTML = `
        <div class="space-y-4">
            <!-- Info file -->
            <div class="p-4 rounded-xl" style="background:var(--purple-bg);">
                <p class="text-xs mb-1" style="color:#374151;">File Dataset</p>
                <p class="font-medium text-sm" style="color:#1e1b4b;">${h.dataset_filename||'—'}</p>
                <p class="text-xs mt-1" style="color:#374151;">${h.total_rows} baris · ${tgl} · ${jam}</p>
            </div>

            <!-- Prediksi utama -->
            <div class="p-4 rounded-xl" style="background:rgba(105,86,246,0.06);border:1px solid rgba(105,86,246,0.18);">
                <p class="text-xs mb-1" style="color:#374151;">Prediksi Konsumsi Gedung Utama</p>
                <p class="text-3xl font-bold" style="color:#6956F6;">
                    ${h.next_day_kwh ? Math.round(h.next_day_kwh).toLocaleString('id-ID') : '—'}
                    <span class="text-base font-normal" style="color:#374151;">kWh</span>
                </p>
                <p class="text-xs mt-1" style="color:#374151;">
                    Estimasi biaya optimal: ${h.next_day_cost ? 'Rp '+(h.next_day_cost/1e6).toFixed(2)+' juta' : '—'}
                </p>
            </div>

            <!-- MAPE desimal -->
            <div class="p-4 rounded-xl" style="background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.18);">
                <p class="text-xs mb-1" style="color:#374151;">Akurasi Model CNN-GSO</p>
                <p class="text-2xl font-bold text-emerald-600">${mapeDesimal(h.mape)}</p>
                <p class="text-xs mt-0.5" style="color:#374151;">MAPE (skala desimal) — semakin kecil semakin akurat</p>
            </div>

            <!-- Rata-rata zona -->
            <div class="p-4 rounded-xl" style="background:var(--purple-bg);">
                <p class="text-xs font-semibold uppercase tracking-wide mb-3" style="color:#6956F6;">Prediksi per Zona</p>
                <div class="space-y-2">
                    ${[
                        ['Zona A (Resto A)', h.zona_a_avg, '#8C4AF2'],
                        ['Zona B (Resto B)', h.zona_b_avg, '#AA9ADB'],
                        ['Zona C (Resto C)', h.zona_c_avg, '#ec4899'],
                    ].map(([label, val, color]) => `
                    <div class="flex justify-between text-sm">
                        <span style="color:#374151;">${label}</span>
                        <span class="font-medium" style="color:${color};">
                            ${val ? Math.round(val).toLocaleString('id-ID')+' kWh' : '—'}
                        </span>
                    </div>`).join('')}
                </div>
            </div>

            <!-- Tombol -->
            <div class="flex gap-3 pt-2">
                <button onclick="closeModal()"
                    class="flex-1 py-2.5 rounded-xl text-sm font-medium"
                    style="background:var(--purple-bg);color:#6956F6;border:1px solid rgba(105,86,246,0.20);">
                    Tutup
                </button>
                <a href="dashboard.html"
                    class="flex-1 py-2.5 text-white rounded-xl text-sm text-center font-medium hover:opacity-90 transition"
                    style="background:#6956F6;box-shadow:0 4px 12px rgba(105,86,246,0.30);">
                    Lihat Dashboard →
                </a>
            </div>
        </div>`;

    document.getElementById('modalOverlay').classList.remove('hidden');
}

function closeModal(e) {
    if (!e || e.target === document.getElementById('modalOverlay')) {
        document.getElementById('modalOverlay').classList.add('hidden');
    }
}

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'index.html';
}
</script>
</body>
</html>
