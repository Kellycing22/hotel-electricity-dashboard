<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hotel Electricity Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Poppins Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/auth-guard.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <style>
        :root {
            --purple-dark:  #6956F6;
            --purple-mid:   #8C4AF2;
            --purple-light: #AA9ADB;
            --purple-bg:    #ECECFC;
            --purple-muted: #A3A1AF;
            --sidebar-text-muted: rgba(255,255,255,0.55);
            --sidebar-text: rgba(255,255,255,0.90);
        }

        * {
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: var(--purple-dark);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center"
                style="background:#6956F6;">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Energy Dashboard</h1>
            <p class="text-gray-500 mt-2">Hotel Electricity Management System</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <!-- Username -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                    Username
                </label>
                <input 
                    type="text" 
                    id="username" 
                    name="username"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="Enter your username"
                >
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    Password
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="Enter your password"
                >
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
            </div>

            <!-- Submit Button -->
            <button 
            type="submit" 
            id="loginBtn"
            class="text-white py-3 rounded-lg font-semibold transition-all hover:opacity-90 shadow-lg"
            style="background:#6956F6; display:block; width:100%;"
        >
            Sign In
        </button>
        </form>
    </div>
</body>
</html>
